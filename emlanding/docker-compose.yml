services:
  base:
    build:
      context: .
      dockerfile: Dockerfile
    command: tail -f /dev/null
    container_name: emlanding
    environment:
      DISPLAY: $DISPLAY
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      ROS_LOCALHOST_ONLY: 1
      SHELL: $SHELL
      SSH_AUTH_SOCK: $SSH_AUTH_SOCK
      TERM: $TERM
      XAUTHORITY: $XAUTHORITY
    image: emlanding 
    network_mode: host
    privileged: true
    restart: always
    runtime: nvidia
    volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - ~/.Xauthority:/root/.Xauthority:rw
    - $SSH_AUTH_SOCK:$SSH_AUTH_SOCK
    - ~/.config/nvim:/root/.config/nvim:rw
    - ~/.config/coc:/root/.config/coc:rw
    - ~/.config/github-copilot:/root/.config/github-copilot:rw
    - ~/.config/Code:/root/.config/Code:rw
    - ~/.local/share/nvim/:/root/.local/share/nvim/:rw
    - ~/.tmux:/root/.tmux:ro
    - ~/.tmux.conf:/root/.tmux.conf:ro
    - ~/.gitconfig:/root/.gitconfig_local
    - /dev:/dev:rw
    - ~/emlanding_ws:/root/emlanding_ws
    - ~/as2_dev_ws:/root/aerostack2_ws
    - ~/project_coresense:/root/project_coresense:rw 
    - ~/docker_setup/emlanding/.mybashrc:/root/.mybashrc
    - ~/.claude:/root/.claude
    - ~/.claude.json:/root/.claude.json
    - ~/.claude.json.backup:/root/.claude.json.backup
